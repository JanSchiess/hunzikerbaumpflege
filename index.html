<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hunziker Baumpflege — Reitnau & Umgebung</title>
  <meta name="description" content="Hunziker Baumpflege in Reitnau & Umgebung. Baumfällung, Baumschnitt, Pflege. Zwischenstand der Website: Am Entstehen." />
  <style>
    :root{
      --bg:#f5f7f6;
      --panel:#ffffff;
      --text:#15201a;
      --muted:#64706a;
      --accent:#106b2d;   /* Grün anpassbar */
      --accent-2:#0b4d20;
      --line:#e6ece9;
      --max:960px;
      --r:16px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      line-height:1.6;
    }
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    img{max-width:100%;height:auto;display:block}
    .wrap{max-width:var(--max);margin:auto;padding:clamp(16px,3vw,28px)}

    /* Gläserner Top-Banner */
    header{
      position:sticky;top:0;z-index:50;
      background:rgba(255,255,255,.7);
      backdrop-filter:saturate(1.2) blur(8px);
      border-bottom:1px solid var(--line);
    }
    .nav{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{font-weight:800;letter-spacing:.2px}
    .call{
      display:inline-flex;align-items:center;gap:.6rem;
      border:1px solid var(--line);background:#fff;border-radius:999px;
      padding:.55rem .9rem; color:var(--text)
    }
    .call strong{white-space:nowrap}

    /* Center-Card */
    .stage{
      min-height:70vh;display:grid;place-items:center;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:clamp(20px,4vw,36px);
      box-shadow:0 10px 40px rgba(0,0,0,.06);
      text-align:center;
    }
    h1{font-size:clamp(1.6rem,4.5vw,2.6rem);margin:.2rem 0 .4rem}
    .eyebrow{
      color:var(--muted);text-transform:uppercase;letter-spacing:.14rem;
      font-size:.92rem;
    }
    .subtitle{color:#2b3430;margin-top:.4rem}
    .locale{display:inline-block;margin-top:.9rem;padding:.25rem .6rem;
      border-radius:999px;border:1px solid var(--line);background:#fff;color:#2b3430;font-size:.95rem}

    /* Rotierende Sprüche */
    .ticker{
      margin-top:1rem;font-size:clamp(1rem,2.8vw,1.25rem);font-weight:600;color:var(--accent);
      min-height:2.2em;display:grid;place-items:center
    }
    .line{
      will-change:opacity,transform;
      opacity:0;transform:translateY(8px) scale(.985);
      transition:opacity .35s ease, transform .35s ease;
      text-wrap:balance;
    }
    .line.show{opacity:1;transform:translateY(0) scale(1)}
    .hint{color:var(--muted);font-size:.95rem;margin-top:.6rem}

    footer{margin-top:24px;padding:24px 0;color:var(--muted);font-size:.95rem;text-align:center}

    @media (prefers-reduced-motion: reduce){
      .line{transition:none}
    }
  </style>
</head>
<body>
  <header aria-label="Top-Bereich">
    <div class="wrap nav">
      <div class="brand">Hunziker Baumpflege</div>
      <a class="call" href="tel:+417860343XX" aria-label="Jetzt anrufen, Telefonnummer 078 603 43 **">
        <!-- TODO: Ersetze XX und ** mit den letzten zwei Ziffern -->
        <span>📞</span><strong>078&nbsp;603&nbsp;43&nbsp;**</strong>
      </a>
    </div>
  </header>

  <main class="wrap">
    <section class="stage">
      <div class="card" role="status" aria-live="polite">
        <div class="eyebrow">Website</div>
        <h1>Am Entstehen…</h1>
        <p class="subtitle">Wir bauen gerade etwas Schönes für Sie auf.</p>
        <span class="locale">🌿 Reitnau & Umgebung</span>

        <div class="ticker" aria-label="Statusmeldungen zur Entstehung">
          <div id="line" class="line">Am Code bewässern…</div>
        </div>
        <p class="hint">Kurz gedulden – bald ist alles bereit.</p>
      </div>
    </section>
  </main>

  <footer>
    © <span id="y"></span> Hunziker Baumpflege • Reitnau & Umgebung • 📞 078&nbsp;603&nbsp;43&nbsp;** • ✉️ <a href="mailto:info@hunzikerbaumpflege.ch">info@hunzikerbaumpflege.ch</a>
  </footer>

  <script>
    // Jahr
    document.getElementById('y')?.append(new Date().getFullYear());

    // 10 Wortspiele/Wartungszeilen (cringe erlaubt 😅)
    const lines = [
      "Am Code bewässern…",
      "Die Seite treibt erste Knospen…",
      "Wir sägen noch die letzten Bugs ab…",
      "Design am Auslichten der Krone…",
      "Neue Features am Einpflanzen…",
      "HTML frisch gedüngt – gleich spriesst es!",
      "Build wächst – bitte nicht gießen, wir übernehmen…",
      "Baumstruktur sortieren… hier und auch draussen…",
      "Startseite am Umtopfen…",
    ];

    const el = document.getElementById('line');
    let i = 0;

    function showNext(){
      if(!el) return;
      // ausblenden
      el.classList.remove('show');
      setTimeout(()=>{
        i = (i + 1) % lines.length;
        el.textContent = lines[i];
        // einblenden
        requestAnimationFrame(()=> el.classList.add('show'));
      }, 220); // kurzer Übergang
    }

    // Start
    el?.classList.add('show');
    // alle 2.8s wechseln
    const interval = setInterval(showNext, 2800);

    // Sauber aufräumen (optional, falls Single Page erweitert wird)
    window.addEventListener('beforeunload', ()=> clearInterval(interval));
  </script>
</body>
</html>
``
