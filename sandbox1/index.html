<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warm Atmospheric Mesh Lab</title>
    <link rel="icon" type="image/png" href="/files/favicon_logo_HB_transparent_circle.png">
    <style>
        :root {
            /* Your Moodboard Palette */
            --amber-glow: #F0AC32;
            --burnt-coral: #E46242;
            --deep-forest: #24694E;
            --dark-void: #0d2119; /* Deep shadow base */
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            background-color: var(--dark-void);
        }

        /* --- THE CRISP FILM GRAIN --- */
        .noise {
            position: fixed; inset: 0;
            z-index: 10;
            opacity: 0.28; /* Higher value = heavier grain */
            pointer-events: none;
            filter: contrast(180%) brightness(1000%);
        }

        /* --- RADIAL MESH SELECTIONS --- */

        /* OPTION A: "Golden Hour Canopy" - Rich amber/coral light cutting into dark green */
        .background.option-a {
            background: 
                radial-gradient(at 15% 15%, var(--amber-glow) 0px, transparent 55%),
                radial-gradient(at 85% 30%, var(--burnt-coral) 0px, transparent 50%),
                radial-gradient(at 50% 85%, var(--deep-forest) 0px, transparent 60%),
                var(--dark-void);
        }

        /* OPTION B: "Ember Eclipse" - Centered warm burn fading into deep forest bounds */
        /*
        .background.option-b {
            background: 
                radial-gradient(circle at 60% 40%, var(--burnt-coral) 0%, transparent 60%),
                radial-gradient(circle at 35% 65%, var(--amber-glow) 0%, transparent 50%),
                radial-gradient(circle at center, var(--deep-forest) 0%, var(--dark-void) 100%);
        }
        */

        .background { position: fixed; inset: 0; z-index: 1; }

        .content {
            position: relative; z-index: 20;
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }

        h1 { font-size: 5rem; margin: 0; letter-spacing: -2px; font-weight: 800; }
        p { font-size: 1.5rem; font-weight: 300; opacity: 0.85; margin-top: 10px; }
    </style>
</head>
<body>

    <svg style="display:none">
        <filter id="film-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <div class="noise" style="filter: url(#film-grain);"></div>
    
    <div class="background option-a"></div>

    <div class="content">
        <h1>HUNZIKER BAUMPFLEGE</h1>
        <p>„Entschieden, gute Arbeit zu leisten.“</p>
    </div>

</body>
</html>
