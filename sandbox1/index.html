<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunziker Baumpflege</title>
    <link rel="icon" type="image/png" href="/files/favicon_logo_HB_transparent_circle.png">
    <style>
        :root {
            --deep: #0f1e19;
            --moss: #243d32;
            --mint: #7da392;
            --glow: #a8c3b8;
            --sunlight: #cbdad3;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background-color: var(--deep);
        }

        /* --- THE GRAIN (Visible Texture) --- */
        .noise {
            position: fixed; inset: 0;
            z-index: 10;
            opacity: 0.25; /* Higher opacity = more visible grain */
            pointer-events: none;
            /* High contrast filter makes the noise pixels "crisp" */
            filter: contrast(170%) brightness(1000%);
        }

        /* --- GRADIENT EXAMPLES --- */

        /* OPTION A: "The Clearing" - Light source top left, deep shadows bottom right */
        .background.option-a {
            background: 
                radial-gradient(circle at 0% 0%, var(--sunlight) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #000 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, var(--moss) 0%, var(--deep) 100%);
        }

        /* OPTION B: "Ethereal Mesh" - Natural, non-linear spots like your image */
        .background.option-b {
            background: 
                radial-gradient(at 80% 10%, var(--mint) 0px, transparent 50%),
                radial-gradient(at 20% 30%, var(--glow) 0px, transparent 45%),
                radial-gradient(at 90% 90%, var(--deep) 0px, transparent 40%),
                radial-gradient(at 10% 85%, var(--moss) 0px, transparent 50%),
                var(--moss);
        }

        /* OPTION C: "Morning Mist" - Soft, high-key green glow */
        .background.option-c {
            background: 
                radial-gradient(at 50% -20%, var(--sunlight) 0px, transparent 70%),
                radial-gradient(at 100% 50%, var(--mint) 0px, transparent 50%),
                radial-gradient(at 0% 50%, var(--glow) 0px, transparent 50%),
                var(--moss);
        }

        .background { position: fixed; inset: 0; z-index: 1; }

        .content {
            position: relative; z-index: 20;
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }

        h1 { font-size: 5rem; margin: 0; letter-spacing: -2px; }
        p { font-size: 1.5rem; font-weight: 300; opacity: 0.8; }
    </style>
</head>
<body>

    <svg style="display:none">
        <filter id="film-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <div class="noise" style="filter: url(#film-grain);"></div>
    
    <div class="background option-c"></div>

    <div class="content">
        <h1>HUNZIKER BAUMPFLEGE</h1>
        <p>„Entschieden, gute Arbeit zu leisten.“</p>
    </div>

</body>
</html>
